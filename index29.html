const PI_IDS = ["patient_interview","physical_assessment","family_history","social_history"];

function scoreSession(orderedTests, diagnosis, caseData, prematureAttempts = []) {
  const correctDx = diagnosis === caseData.correctDx;
  const total = orderedTests.length;
  if (!total) return { overall:0, testScore:0, dxScore:0, patientFirst:false, anyPatientInteraction:false, correctDx, optimal:0, acceptable:0, suboptimal:0, totalSpent:0, totalDistractors:0, prematurePenalty:0 };
  const firstIsPatient = PI_IDS.includes(orderedTests[0].id);
  const anyPatient = orderedTests.some(t => PI_IDS.includes(t.id));
  const optimal    = orderedTests.filter(t => t.relevance === "optimal").length;
  const acceptable = orderedTests.filter(t => t.relevance === "acceptable").length;
  const suboptimal = orderedTests.filter(t => t.relevance === "suboptimal").length;
  const totalDistractors = orderedTests.reduce((s,t) => s + (t.distractorCount || 0), 0);
  let testScore = Math.round(((optimal * 3 + acceptable * 1.5) / (total * 3)) * 100);
  if (!anyPatient) testScore = Math.max(0, testScore - 20);
  else if (!firstIsPatient) testScore = Math.max(0, testScore - 10);
  // 3 points deducted per irrelevant interview question asked
  testScore = Math.max(0, testScore - (totalDistractors * 3));
  // 5 points deducted per premature test attempt (trying to run a test before prerequisites are met)
  const prematurePenalty = prematureAttempts.length * 5;
  testScore = Math.max(0, testScore - prematurePenalty);
  const dxScore = correctDx ? 100 : 0;
  const overall = Math.round(testScore * 0.55 + dxScore * 0.45);
  const totalSpent = orderedTests.reduce((s,t) => s + (t.cost||0), 0);
  return { overall, testScore, dxScore, patientFirst:firstIsPatient, anyPatientInteraction:anyPatient, correctDx, optimal, acceptable, suboptimal, totalSpent, totalDistractors, prematurePenalty };
}

function scoreColor(n) {
  if (n >= 75) return "#2e7d52";
  if (n >= 50) return "#b7860a";
  return "#c0392b";
}

const SHEETS_URL = "https://script.google.com/macros/s/AKfycbxkPo4owcHx6lAEZK-tyJg7j4QCUwx4Z5jEP51o2edc_SRtVOxC8PkLM4PyHU3zRTbDIw/exec";

async function saveResult(payload) {
  if (!SHEETS_URL) return;
  try {
    await fetch(SHEETS_URL, {
      method: "POST",
      headers: { "Content-Type": "text/plain" },
      body: JSON.stringify({ action: "save", ...payload })
    });
  } catch(e) { /* silent fail */ }
}

async function loadResults() {
  if (!SHEETS_URL) return [];
  try {
    const res = await fetch(`${SHEETS_URL}?action=load`);
    const data = await res.json();
    return (data.results || []).sort((a,b) => new Date(b.ts) - new Date(a.ts));
  } catch(e) { console.warn("MedSim: Failed to load:", e); return []; }
}

// Renders result strings: newlines → <br>, [text](url) → <a>, >SeqID lines → monospace
function ResultText({ text }) {
  if (!text) return null;
  const lines = text.split('\n');
  return (
    <span>
      {lines.map((line, i) => {
        const linkMatch = line.match(/^\[(.+?)\]\((.+?)\)$/);
        const fastaMatch = line.match(/^>/) || line.match(/^[ACGTU]{30,}$/);
        const dividerMatch = line.match(/^─+$/);
        if (linkMatch) {
          return (
            <span key={i}>
              <a href={linkMatch[2]} target="_blank" rel="noopener noreferrer"
                style={{color:"var(--accent3)",fontFamily:"var(--mono)",fontSize:12,textDecoration:"underline",fontWeight:500}}>
                {linkMatch[1]}
              </a>
              {i < lines.length - 1 && <br />}
            </span>
          );
        }
        if (fastaMatch || dividerMatch) {
          return (
            <span key={i}>
              <span style={{fontFamily:"var(--mono)",fontSize:11,color:"var(--ink2)",wordBreak:"break-all",display:"block",lineHeight:1.6,background:"var(--surface2)",padding:"2px 6px",borderRadius:3,margin:"2px 0"}}>
                {line}
              </span>
            </span>
          );
        }
        return (
          <span key={i}>
            {line}
            {i < lines.length - 1 && <br />}
          </span>
        );
      })}
    </span>
  );
}

// Renders lab/vitals result strings as structured tables where possible.
// Detects lines matching "Name (normal X): value \u2014 interpretation" or "Name: value (flag)"
// and renders them as 3-column rows: Test | Value | Interpretation
function LabResultText({ text }) {
  if (!text) return null;
  const lines = text.split('\n');

  // Group consecutive parseable lines into table blocks
  const blocks = [];
  let tableRows = [];
  let label = null;

  const flushTable = () => {
    if (tableRows.length > 0) { blocks.push({ type:'table', rows:[...tableRows], label }); tableRows = []; label = null; }
  };

  for (const line of lines) {
    if (!line.trim()) { flushTable(); blocks.push({ type:'spacer' }); continue; }

    // Section headers like "VITAL SIGNS:" or "PHYSICAL FINDINGS:"
    if (/^[A-Z][A-Z\s\/]+:$/.test(line.trim())) {
      flushTable(); label = line.trim().replace(/:$/, ''); continue;
    }

    // Markdown link line — render directly as a link block
    if (/^\[.+\]\(https?:\/\/.+\)$/.test(line.trim())) {
      flushTable();
      blocks.push({ type:'text', text: line.trim() });
      continue;
    }
    const labMatch = line.match(/^(.+?)\s*\(([^)]+)\):\s*(.+?)\s*[—–-]{1,2}\s*(.+)$/);
    // Vitals line: "Name: value (flag)" e.g. "Temp: 39.7\u00B0C (normal 36.1\u201337.2\u00B0C)"
    const vitalMatch = !labMatch && line.match(/^([^:]+):\s*([^\(]+)\s*\(([^)]+)\)$/);
    // Simple vitals: "Name: value"
    const simpleMatch = !labMatch && !vitalMatch && line.match(/^([A-Za-z][^:]{1,40}):\s*(.+)$/);

    if (labMatch) {
      tableRows.push({ test: labMatch[1].trim(), ref: labMatch[2].trim(), value: labMatch[3].trim(), interp: labMatch[4].trim() });
    } else if (vitalMatch) {
      tableRows.push({ test: vitalMatch[1].trim(), ref: '', value: vitalMatch[2].trim(), interp: vitalMatch[3].trim() });
    } else if (simpleMatch && tableRows.length > 0) {
      // continuation of a table block
      tableRows.push({ test: simpleMatch[1].trim(), ref: '', value: simpleMatch[2].trim(), interp: '' });
    } else {
      flushTable();
      blocks.push({ type:'text', text: line });
    }
  }
  flushTable();

  return (
    <span>
      {blocks.map((b, i) => {
        if (b.type === 'spacer') return <br key={i} />;
        if (b.type === 'text') return (
          <span key={i} style={{ display:'block', fontFamily:'var(--serif)', fontSize:14, lineHeight:1.7, marginBottom:4 }}>
            <ResultText text={b.text} />
          </span>
        );
        // table block
        const hasRef = b.rows.some(r => r.ref);
        const hasInterp = b.rows.some(r => r.interp);
        return (
          <span key={i} style={{ display:'block', marginBottom:10 }}>
            {b.label && (
              <span style={{ display:'block', fontFamily:'var(--mono)', fontSize:9.5, letterSpacing:'1.2px', textTransform:'uppercase', color:'var(--muted)', fontWeight:600, marginBottom:6, paddingBottom:4, borderBottom:'1px solid var(--border)' }}>
                {b.label}
              </span>
            )}
            <table style={{ width:'100%', borderCollapse:'collapse', fontSize:13 }}>
              <thead>
                <tr style={{ borderBottom:'1px solid var(--border)' }}>
                  <th style={{ fontFamily:'var(--mono)', fontSize:9, textTransform:'uppercase', letterSpacing:'1px', color:'var(--muted)', padding:'3px 10px 5px 0', textAlign:'left', width:'28%' }}>Test</th>
                  {hasRef && <th style={{ fontFamily:'var(--mono)', fontSize:9, textTransform:'uppercase', letterSpacing:'1px', color:'var(--muted)', padding:'3px 10px 5px 0', textAlign:'left', width:'20%' }}>Reference</th>}
                  <th style={{ fontFamily:'var(--mono)', fontSize:9, textTransform:'uppercase', letterSpacing:'1px', color:'var(--muted)', padding:'3px 10px 5px 0', textAlign:'left', width:'18%' }}>Result</th>
                  {hasInterp && <th style={{ fontFamily:'var(--mono)', fontSize:9, textTransform:'uppercase', letterSpacing:'1px', color:'var(--muted)', padding:'3px 0 5px 0', textAlign:'left' }}>Interpretation</th>}
                </tr>
              </thead>
              <tbody>
                {b.rows.map((r, j) => {
                  const isAbnormal = /↑|↓|HIGH|LOW|ELEVATED|CRITICAL|POSITIVE|abnormal/i.test(r.value + r.interp);
                  return (
                    <tr key={j} style={{ borderBottom: j < b.rows.length-1 ? '1px solid var(--border)' : 'none' }}>
                      <td style={{ fontFamily:'var(--sans)', fontWeight:500, fontSize:13, color:'var(--ink)', padding:'6px 10px 6px 0', verticalAlign:'top' }}>{r.test}</td>
                      {hasRef && <td style={{ fontFamily:'var(--mono)', fontSize:11, color:'var(--muted)', padding:'6px 10px 6px 0', verticalAlign:'top' }}>{r.ref}</td>}
                      <td style={{ fontFamily:'var(--mono)', fontSize:13, fontWeight:600, color: isAbnormal ? 'var(--accent)' : 'var(--accent2)', padding:'6px 10px 6px 0', verticalAlign:'top', whiteSpace:'nowrap' }}>{r.value}</td>
                      {hasInterp && <td style={{ fontFamily:'var(--serif)', fontSize:13, color:'var(--ink)', lineHeight:1.5, padding:'6px 0 6px 0', verticalAlign:'top' }}>{r.interp}</td>}
                    </tr>
                  );
                })}
              </tbody>
            </table>
          </span>
        );
      })}
    </span>
  );
}
function InterviewSummary({ transcript }) {
  if (!transcript || transcript.length === 0) return <span style={{color:"var(--muted)",fontFamily:"var(--mono)",fontSize:12}}>No transcript available.</span>;
  // Pair up provider questions with patient responses, skip opening patient message
  const pairs = [];
  for (let i = 0; i < transcript.length; i++) {
    if (transcript[i].role === "provider") {
      const response = transcript[i + 1]?.role === "patient" ? transcript[i + 1].text : "\u2014";
      pairs.push({ q: transcript[i].text, a: response, distractor: transcript[i].distractor });
    }
  }
  if (pairs.length === 0) return <span style={{color:"var(--muted)",fontFamily:"var(--mono)",fontSize:12}}>No questions asked.</span>;
  return (
    <table style={{ width:"100%", borderCollapse:"collapse", fontSize:13 }}>
      <thead>
        <tr style={{ borderBottom:"1px solid var(--border)" }}>
          <th style={{ fontFamily:"var(--mono)", fontSize:9, textTransform:"uppercase", letterSpacing:"1px", color:"var(--muted)", padding:"4px 8px 6px 0", textAlign:"left", width:"38%" }}>Question Asked</th>
          <th style={{ fontFamily:"var(--mono)", fontSize:9, textTransform:"uppercase", letterSpacing:"1px", color:"var(--muted)", padding:"4px 0 6px 8px", textAlign:"left" }}>Patient Response</th>
        </tr>
      </thead>
      <tbody>
        {pairs.map((p, i) => (
          <tr key={i} style={{ borderBottom: i < pairs.length - 1 ? "1px solid var(--border)" : "none", opacity: p.distractor ? 0.55 : 1 }}>
            <td style={{ fontFamily:"var(--sans)", fontSize:13, color: p.distractor ? "var(--muted)" : "var(--ink)", padding:"7px 8px 7px 0", verticalAlign:"top", fontStyle: p.distractor ? "italic" : "normal" }}>
              {p.distractor && <span style={{fontFamily:"var(--mono)",fontSize:9,color:"var(--accent)",marginRight:5,textTransform:"uppercase",letterSpacing:"0.5px"}}>off-topic</span>}
              {p.q}
            </td>
            <td style={{ fontFamily:"var(--serif)", fontSize:13.5, color:"var(--ink)", padding:"7px 0 7px 8px", verticalAlign:"top", lineHeight:1.55 }}>{p.a}</td>
          </tr>
        ))}
      </tbody>
    </table>
  );
}

function InterviewModal({ caseData, onClose, onComplete }) {
  const [askedIds, setAskedIds] = useState(new Set());
  const [distractorIds, setDistractorIds] = useState(new Set());
  const [transcript, setTranscript] = useState([
    { role:"patient", text:`Hi, I'm ${caseData.patientName}. I'm really not feeling well \u2014 I'm glad you could see me.` }
  ]);

  const QUESTION_LIMIT = 8;
  const allQuestions = Object.values(OLDCARTS_QUESTIONS).flat();
  const questionsRemaining = QUESTION_LIMIT - askedIds.size;
  const atLimit = askedIds.size >= QUESTION_LIMIT;

  function askQuestion(q) {
    if (askedIds.has(q.id)) return;
    const response = q.distractor
      ? (DISTRACTOR_RESPONSES[q.id] || "I'm not sure that's relevant, but I'm happy to answer.")
      : (caseData.interviewResponses[q.id] || "I'm not sure how to answer that.");
    setTranscript(prev => [
      ...prev,
      { role:"provider", text:q.q, distractor: q.distractor },
      { role:"patient",  text:response, distractor: q.distractor }
    ]);
    setAskedIds(prev => new Set([...prev, q.id]));
    if (q.distractor) setDistractorIds(prev => new Set([...prev, q.id]));
  }

  return (
    <div className="interview-modal-bg">
      <div className="interview-modal">
        {/* Header */}
        <div className="interview-header">
          <div className="patient-avatar">🧑‍⚕️</div>
          <div className="interview-header-text">
            <h3>Patient Interview — {caseData.patientName}, {caseData.patientAge}</h3>
            <p>You may ask up to 8 questions. Choose carefully — {questionsRemaining} question{questionsRemaining !== 1 ? "s" : ""} remaining.</p>
          </div>
        </div>

        {/* Chat transcript */}
        <div className="chat-window">
          {transcript.map((msg, i) => (
            <div key={i} className={`chat-msg ${msg.role}`}>
              <div className={`chat-avatar ${msg.role === "patient" ? "pa" : "pr"}`}>
                {msg.role === "patient" ? "🧑" : "MD"}
              </div>
              <div className="chat-bubble">{msg.text}</div>
            </div>
          ))}
        </div>

        {/* Question list — flat, no category labels */}
        <div className="qpanel">
          <div className="qlist">
            {allQuestions.map(q => {
              const asked = askedIds.has(q.id);
              const disabled = asked || (atLimit && !asked);
              return (
                <button key={q.id} className={`qbtn ${asked ? "asked" : ""} ${atLimit && !asked ? "qbtn-disabled" : ""}`} onClick={() => askQuestion(q)} disabled={disabled}>
                  <span className="qbtn-text">{q.q}</span>
                  {asked && <span className="qbtn-asked-tag">✓</span>}
                </button>
              );
            })}
          </div>
        </div>

        {/* Footer */}
        <div className="interview-footer">
          <span className="asked-count">
            {askedIds.size}/8 questions asked
            {atLimit && <span style={{ color:"var(--accent)", marginLeft:8, fontWeight:600 }}>Limit reached</span>}
          </span>
          <div className="flex gap-8">
            <button className="btn btn-outline btn-sm" onClick={onClose}>Cancel</button>
            <button className="btn btn-success btn-sm" onClick={() => onComplete(transcript, askedIds.size, distractorIds.size)}>
              End Interview →
            </button>
          </div>
        </div>
      </div>
    </div>
  );
}

function shuffle(arr) {
  const a = [...arr];
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

function SpecModal({ test, caseData, lymphBiopsied, onConfirm, onCancel }) {
  const [spec, setSpec] = useState("");
  const LYMPH_OPT = "Lymph Node (requires lymph node biopsy)";
  const rawOptions = caseData.tests[test.id]?.options || [];
  const options = React.useMemo(() => {
    const nonLymph = rawOptions.filter(o => o !== LYMPH_OPT);
    const shuffled = shuffle(nonLymph);
    return rawOptions.includes(LYMPH_OPT) ? [...shuffled, LYMPH_OPT] : shuffled;
  }, []);
  return (
    <div className="modal-bg" onClick={onCancel}>
      <div className="modal" onClick={e => e.stopPropagation()}>
        <h3>{test.name}</h3>
        <p>This test requires a specification before it can be ordered. Select from the options available for this case.</p>
        <div className="field">
          <label className="field-label">{test.specLabel}</label>
          <select value={spec} onChange={e => setSpec(e.target.value)}>
            <option value="">— Select —</option>
            {options.map(o => {
              const isLymph = o === LYMPH_OPT;
              const locked = isLymph && !lymphBiopsied;
              return (
                <option key={o} value={locked ? "" : o} disabled={locked}>
                  {o}{locked ? " 🔒" : ""}
                </option>
              );
            })}
          </select>
          {test.id === "fluid_culture" && !lymphBiopsied && (
            <p style={{fontSize:11,color:"var(--muted)",marginTop:4}}>🔒 Lymph node culture requires a lymph node biopsy to be performed first.</p>
          )}
        </div>
        <div className="flex gap-8 justify-end mt-12">
          <button className="btn btn-outline btn-sm" onClick={onCancel}>Cancel</button>
          <button className="btn btn-primary btn-sm" disabled={!spec} onClick={() => onConfirm(spec)}>Order Test</button>
        </div>
      </div>
    </div>
  );
}

// SCORE RING
// ─────────────────────────────────────────────────────────────────────────────
function ScoreRing({ value, size=100, stroke=8 }) {
  const r = (size - stroke) / 2;
  const circ = 2 * Math.PI * r;
  const color = scoreColor(value);
  return (
    <div className="score-ring" style={{ width:size, height:size }}>
      <svg width={size} height={size}>
        <circle cx={size/2} cy={size/2} r={r} fill="none" stroke="#e8e4dc" strokeWidth={stroke} />
        <circle cx={size/2} cy={size/2} r={r} fill="none" stroke={color} strokeWidth={stroke}
          strokeDasharray={`${(value/100)*circ} ${circ}`} strokeLinecap="round"
          style={{ transition:"stroke-dasharray 1s ease .3s" }} />
      </svg>
      <div className="score-ring-num">
        <span className="big" style={{ color }}>{value}</span>
        <span className="sm">/ 100</span>
      </div>
    </div>
  );
}

function App() {
  const [screen, setScreen]           = useState("intro");
  const [studentName, setStudentName] = useState("");
  const [sectionNum, setSectionNum]   = useState("");
  const [assessType, setAssessType]   = useState(null);
  const [activeCase, setActiveCase]   = useState(null);
  const [orderedTests, setOrderedTests] = useState([]);
  const [pendingSpec, setPendingSpec] = useState(null);
  const [processingId, setProcessingId] = useState(null);
  const [showInterview, setShowInterview] = useState(false);
  const [interviewDone, setInterviewDone] = useState(false);
  const [interviewTranscript, setInterviewTranscript] = useState([]);
  const [selectedDx, setSelectedDx]   = useState("");
  const [showDxPanel, setShowDxPanel] = useState(false);
  const [finalScore, setFinalScore]   = useState(null);
  const [aiFeedback, setAiFeedback]   = useState("");
  const [loadingFb, setLoadingFb]     = useState(false);
  const [boardData, setBoardData]     = useState([]);
  const [loadingBoard, setLoadingBoard] = useState(false);
  const [activeCategory, setActiveCategory] = useState("All");
  const [prematureAttempts, setPrematureAttempts] = useState([]);
  const [hasSaved, setHasSaved]               = useState(false);
  const [showRefGuide, setShowRefGuide]         = useState(false);
  const [showInterviewReview, setShowInterviewReview] = useState(false);
  const [showTutorial, setShowTutorial]           = useState(false);

  const usedIds         = new Set(orderedTests.filter(t => !t.premature && t.id !== "selective_media" && t.id !== "fluid_culture" && t.id !== "antigen_ab").map(t => t.id));
  const TEST_LIMIT      = 8;
  const testsUsed       = orderedTests.filter(t => !t.premature).length;
  const testsRemaining  = TEST_LIMIT - testsUsed;
  const atTestLimit     = testsUsed >= TEST_LIMIT;
  const totalSpent      = orderedTests.reduce((s,t) => s + (t.cost||0), 0);
  const patientDone     = orderedTests.some(t => PI_IDS.includes(t.id));
  // A specimen is "available" once the student has ordered blood culture, urine culture, or biopsy
  const specimenAvailable = orderedTests.some(t => TEST_MENU.find(m => m.id === t.id)?.providesSpecimen || t.id === "biopsy");
  const lymphBiopsied     = orderedTests.some(t => t.id === "biopsy" && t.name.includes("Lymph Node") && !t.premature);
  // Physical assessment must be done before biopsy
  const physicalDone    = usedIds.has("physical_assessment");

  // ── Order test ──────────────────────────────────────────────────────────
  function handleTestClick(menuItem) {
    if (usedIds.has(menuItem.id) || processingId) return;
    if (atTestLimit) return;
    if (menuItem.isInterview) { setShowInterview(true); return; }
    if (menuItem.needsSpec) { setPendingSpec(menuItem); return; }
    executeOrder(menuItem, null);
  }

  function handleSpecConfirm(spec) {
    const item = pendingSpec; setPendingSpec(null);
    // Prevent ordering the same spec twice for re-orderable tests
    if (item.id === "selective_media" || item.id === "fluid_culture") {
      const alreadyOrdered = orderedTests.some(t => t.id === item.id && t.spec === spec);
      if (alreadyOrdered) return;
    }
    executeOrder(item, spec);
  }

  function executeOrder(menuItem, spec) {
    setProcessingId(menuItem.id);
    // Check prerequisites — if unmet, return a "no result" report and record attempt
    const needsSpecimen = menuItem.requiresSpecimen && !specimenAvailable;
    const needsPhysical = menuItem.requiresPhysical && !physicalDone;
    if (needsSpecimen || needsPhysical) {
      const reason = needsSpecimen
        ? "No specimen available \u2014 collect a sample first (Body Fluid Culture or Biopsy)"
        : "Physical Assessment required before this test can be ordered";
      setPrematureAttempts(prev => [...prev, { id: menuItem.id, name: menuItem.name, reason }]);
      setTimeout(() => {
        setOrderedTests(prev => [...prev, {
          id: menuItem.id,
          name: menuItem.name,
          spec: spec || null,
          cost: menuItem.cost, category: menuItem.category,
          relevance: "suboptimal",
          result: `\u26A0 No result \u2014 ${reason}. This test cannot be processed without completing the prerequisite step first.`,
          resultClass: "result-normal",
          premature: true,
        }]);
        setProcessingId(null);
      }, 900);
      return;
    }
    setTimeout(() => {
      const caseTest = activeCase.tests[menuItem.id];
      let rd;
      if (spec && caseTest?.results) {
        rd = caseTest.results[spec] || caseTest.results["default"] || { result:"No result for this specification.", resultClass:"result-normal", relevance:"suboptimal" };
      } else {
        rd = caseTest || { result:"No result data available.", resultClass:"result-normal", relevance:"suboptimal" };
      }
      setOrderedTests(prev => [...prev, {
        id: menuItem.id,
        name: menuItem.name,
        spec: spec || null,
        cost: menuItem.cost, category: menuItem.category,
        relevance: rd.relevance, result: rd.result, resultClass: rd.resultClass,
      }]);
      setProcessingId(null);
    }, 900);
  }

  // ── Interview complete ──────────────────────────────────────────────────
  function handleInterviewComplete(transcript, questionCount, distractorCount) {
    setShowInterview(false);
    setInterviewDone(true);
    setInterviewTranscript(transcript);
    const relevantCount = questionCount - distractorCount;
    const categoriesCovered = new Set(
      transcript.filter(m => m.role === "provider" && !m.distractor).map(m => {
        for (const [cat, qs] of Object.entries(OLDCARTS_QUESTIONS)) {
          if (qs.some(q => q.q === m.text)) return cat;
        }
        return null;
      }).filter(Boolean)
    ).size;
    // Relevance: based on category coverage minus a penalty for distractors asked
    const penalizedCoverage = categoriesCovered - distractorCount;
    const relevance = penalizedCoverage >= 6 ? "optimal" : penalizedCoverage >= 3 ? "acceptable" : "suboptimal";
    const distractorNote = distractorCount > 0 ? ` | ${distractorCount} irrelevant question${distractorCount > 1 ? "s" : ""} asked (penalized)` : "";
    setOrderedTests(prev => [...prev, {
      id: "patient_interview",
      name: `Patient Interview (${relevantCount} relevant, ${distractorCount} irrelevant, ${categoriesCovered} categories covered)`,
      cost: TEST_MENU.find(t => t.id === "patient_interview")?.cost ?? 30, category: "Direct Patient",
      relevance,
      result: `Interview completed. ${relevantCount} relevant questions asked across ${categoriesCovered} clinical categories.${distractorNote}`,
      resultClass: relevance === "optimal" ? "result-positive" : relevance === "acceptable" ? "result-notable" : "result-normal",
      distractorCount,
    }]);
  }

  // ── Submit diagnosis ────────────────────────────────────────────────────
  async function submitDx() {
    const sc = scoreSession(orderedTests, selectedDx, activeCase, prematureAttempts);
    setFinalScore(sc);
    setScreen("result");
    if (!hasSaved) {
      setHasSaved(true);
      await saveResult({ name:studentName, section:sectionNum, assessType, caseId:activeCase.id, caseTitle:activeCase.title, score:sc.overall, testScore:sc.testScore, dxScore:sc.dxScore, diagnosis:selectedDx, correctDx:activeCase.correctDx, testsOrdered:orderedTests.map(t=>t.name), optimal:sc.optimal, acceptable:sc.acceptable, suboptimal:sc.suboptimal, patientFirst:sc.patientFirst, anyPatientInteraction:sc.anyPatientInteraction, spent:sc.totalSpent, prematureAttempts:prematureAttempts.length, prematureTests:prematureAttempts.map(a=>a.name).join("; "), ts:new Date().toISOString() });
    }
  }

  async function openBoard() {
    setScreen("results_board"); setLoadingBoard(true);
    setBoardData(await loadResults()); setLoadingBoard(false);
  }

  function reset() {
    setScreen("intro"); setStudentName(""); setSectionNum(""); setAssessType("pre");
    setActiveCase(null); setOrderedTests([]); setSelectedDx("");
    setFinalScore(null); setAiFeedback(""); setShowDxPanel(false);
    setInterviewDone(false); setInterviewTranscript([]); setActiveCategory("All");
    setPrematureAttempts([]); setHasSaved(false); setShowRefGuide(false); setShowInterviewReview(false); setShowTutorial(false);
  }

  const categories = ["All","Direct Patient","Lab","Imaging","Procedure"];
  const visibleTests = TEST_MENU.filter(t =>
    activeCategory === "All" ? true :
    activeCategory === "Lab" ? t.category.startsWith("Lab") :
    t.category === activeCategory
  );
  const labSubcats = ["Lab \u2014 Micro","Lab \u2014 Serology","Lab \u2014 Hematology","Lab \u2014 Chemistry","Lab \u2014 Molecular","Lab \u2014 Pathology","Lab \u2014 Immunology"];

  // ─────────────────────────────────────────────────────────────────────────
  return (
    <>
      <G />
      <div className="app">

        {/* HEADER */}
        <div className="site-header">
          <div className="site-logo">🧫</div>
          <div>
            <h1>MedSim</h1>
            <p>Infectious Disease · Clinical Reasoning</p>
          </div>
          <div className="header-nav">
            <button className="btn btn-outline btn-sm" onClick={() => setShowRefGuide(true)}>📋 Test Reference</button>
            {screen !== "intro" && <button className="btn btn-outline btn-sm" onClick={reset}>↩ Restart</button>}
          </div>
        </div>

        {/* ── INTRO ─────────────────────────────────────────────────────── */}
        {screen === "intro" && (
          <div style={{ maxWidth:540, margin:"0 auto" }}>
            <p className="display mb-8">Clinical Case Simulation</p>
            <p className="serif-body mb-16">Work through an infectious disease case by interviewing your patient, ordering diagnostic tests, and arriving at a final diagnosis. You may order up to <strong>8 tests</strong> — choose efficiently. Ordering unnecessary or redundant tests will reduce your score, so prioritize tests most likely to confirm or rule out your working diagnosis.</p>
            <div className="card">
              <div className="card-body">
                <div className="field">
                  <label className="field-label">Initials &amp; Lab Seat Number</label>
                  <input type="text" placeholder="e.g. JD14" value={studentName} onChange={e => setStudentName(e.target.value)} />
                </div>
                <div className="field">
                  <label className="field-label">Class Section</label>
                  <input type="text" placeholder="e.g. 12345" value={sectionNum} onChange={e => setSectionNum(e.target.value)} />
                  <p style={{ fontFamily:"var(--mono)", fontSize:10, color:"var(--muted)", marginTop:4 }}>If you are not currently enrolled in a course, type <strong>none</strong>.</p>
                </div>
                <div className="field">
                  <label className="field-label">Assessment Type</label>
                  <div style={{ display:"flex", gap:8 }}>
                    {["pre","post"].map(type => (
                      <button key={type} onClick={() => setAssessType(type)}
                        style={{ flex:1, padding:"10px 16px", border:`2px solid ${assessType===type ? "var(--ink)" : "var(--border2)"}`, borderRadius:"var(--radius)", background: assessType===type ? "var(--ink)" : "var(--surface)", color: assessType===type ? "var(--bg)" : "var(--ink2)", fontFamily:"var(--sans)", fontSize:14, fontWeight: assessType===type ? 600 : 400, cursor:"pointer", transition:"all .15s" }}>
                        {type === "pre" ? "Pre-Assessment" : "Post-Assessment"}
                      </button>
                    ))}
                  </div>
                  {!assessType && <p style={{ fontFamily:"var(--mono)", fontSize:10, color:"var(--accent)", marginTop:6 }}>Select an assessment type to begin.</p>}
                </div>
                <div className="flex justify-end">
                  <button className="btn btn-primary" disabled={!studentName.trim() || !sectionNum.trim() || !assessType} onClick={() => {
                    const pool = assessType === "pre"
                      ? CASES.filter(c => ["dengue","rmsf","meningococcal"].includes(c.id))
                      : CASES.filter(c => ["norovirus","ecoli_stec","mycoplasma"].includes(c.id));
                    const chosen = pool[Math.floor(Math.random() * pool.length)];
                    const shuffled = shuffle(chosen.diagnosisOptions);
                    setActiveCase({ ...chosen, diagnosisOptions: shuffled });
                    setScreen("sim");
                    setShowTutorial(true);
                  }}>Begin Assessment →</button>
                </div>
              </div>
            </div>
          </div>
        )}


        {/* ── SIMULATION ────────────────────────────────────────────────── */}
        {screen === "sim" && activeCase && (
          <div style={{ display:"grid", gridTemplateColumns:"1fr 330px", gap:18, alignItems:"start" }}>

            {/* LEFT */}
            <div className="flex-col gap-16">

              {/* Vignette */}
              <div className="card">
                <div className="card-head">
                  <span className="mono-label">📋 Clinical Presentation</span>
                </div>
                <div className="card-body">
                  <p style={{ fontFamily:"var(--serif)", fontSize:16, fontWeight:700, marginBottom:8 }}>{activeCase.title} — {activeCase.subtitle}</p>
                  <p className="serif-body">{activeCase.vignette}</p>
                </div>
              </div>

              {/* Diagnosis panel */}
              {showDxPanel && (
                <div className="card">
                  <div className="card-head"><span className="mono-label">🩺 Submit Your Diagnosis</span></div>
                  <div className="card-body">
                    <p className="serif-body mb-12">Based on your patient interview and diagnostic workup, what is the most likely diagnosis?</p>
                    <div className="dx-grid mb-16">
                      {activeCase.diagnosisOptions.map(dx => (
                        <button key={dx} className={`dx-option ${selectedDx===dx?"selected":""}`} onClick={() => setSelectedDx(dx)}>{dx}</button>
                      ))}
                    </div>
                    {!orderedTests.length && <div className="alert alert-warn mb-12">⚠️ You have not ordered any tests or conducted a patient interview yet.</div>}
                    <div className="flex justify-end gap-8">
                      <button className="btn btn-outline" onClick={() => setShowDxPanel(false)}>← Keep Working</button>
                      <button className="btn btn-success" disabled={!selectedDx} onClick={submitDx}>Submit Diagnosis ✓</button>
                    </div>
                  </div>
                </div>
              )}

              {/* Results */}
              {orderedTests.length > 0 && (
                <div className="card">
                  <div className="card-head"><span className="mono-label">📂 Results Received ({orderedTests.length})</span></div>
                  <div style={{ overflowX:"auto" }}>
                    <table className="results-table">
                      <thead>
                        <tr>
                          <th style={{ width:24 }}>#</th>
                          <th>Test</th>
                          <th>Result</th>
                        </tr>
                      </thead>
                      <tbody>
                        {processingId && (
                          <tr>
                            <td colSpan={3} style={{ padding:"12px 16px" }}>
                              <div className="loading-row"><div className="spinner" /> Processing {TEST_MENU.find(t => t.id === processingId)?.name}…</div>
                            </td>
                          </tr>
                        )}
                        {[...orderedTests].reverse().map((t, i) => {
                          const stripeClass = t.resultClass === "result-positive" ? "result-stripe-positive"
                            : t.resultClass === "result-notable" ? "result-stripe-notable"
                            : "result-stripe-normal";
                          const isInterview = t.id === "patient_interview";
                          const num = orderedTests.length - i;
                          return (
                            <tr key={i} className={stripeClass}>
                              <td className="result-num-cell">{num}</td>
                              <td className="result-name-cell">
                                <div className="test-label">{isInterview ? "Patient Interview" : t.name}{t.spec ? <span style={{ fontFamily:"var(--mono)", fontSize:10, color:"var(--muted)", fontWeight:400 }}> — {t.spec}</span> : ""}</div>
                                <div className="test-cat">{t.category}</div>
                              </td>
                              <td className="result-value-cell">
                                {isInterview
                                  ? (
                                    <div>
                                      <p style={{ fontFamily:"var(--serif)", fontSize:14, lineHeight:1.6, color:"var(--ink2)", marginBottom:8 }}>{t.result}</p>
                                      <button className="btn btn-outline btn-xs" onClick={() => setShowInterviewReview(true)}>
                                        💬 Review Interview Transcript
                                      </button>
                                    </div>
                                  )
                                  : <LabResultText text={t.result} />
                                }
                              </td>
                            </tr>
                          );
                        })}
                      </tbody>
                    </table>
                  </div>
                </div>
              )}
            </div>

            {/* RIGHT — test menu */}
            <div style={{ position:"sticky", top:16 }}>
              <div className="card">
                <div className="card-head">
                  <span className="mono-label">🔬 Diagnostic Menu</span>
                  <span style={{ fontFamily:"var(--mono)", fontSize:10, color: atTestLimit ? "var(--accent)" : "var(--muted)", marginLeft:"auto", fontWeight: atTestLimit ? 700 : 400 }}>
                    {testsUsed}/{TEST_LIMIT} tests{atTestLimit ? " \u2014 limit reached" : ""}
                  </span>
                </div>
                <div className="card-body" style={{ padding:"12px 14px" }}>

                  {/* Running cost */}
                  {orderedTests.length > 0 && (
                    <div style={{ display:"flex", justifyContent:"space-between", alignItems:"baseline", marginBottom:10, padding:"6px 10px", background:"var(--surface2)", borderRadius:"var(--radius)", border:"1px solid var(--border)" }}>
                      <span style={{ fontFamily:"var(--mono)", fontSize:9, textTransform:"uppercase", letterSpacing:"1px", color:"var(--muted)" }}>Est. Cost</span>
                      <span style={{ fontFamily:"var(--mono)", fontSize:13, fontWeight:600, color:"var(--ink)" }}>${orderedTests.reduce((s,t) => s + (t.cost||0), 0).toLocaleString()}</span>
                    </div>
                  )}

                  {/* 1 test remaining warning */}
                  {testsUsed === TEST_LIMIT - 1 && (
                    <div className="alert alert-warn" style={{ fontSize:11, padding:"6px 10px", marginBottom:8 }}>
                      ⚠️ 1 test remaining — choose carefully.
                    </div>
                  )}

                  {/* Category tabs */}
                  <div style={{ display:"flex", flexWrap:"wrap", gap:4, marginBottom:8 }}>
                    {categories.map(cat => {
                      const isActive = cat==="All" ? activeCategory==="All" : cat==="Lab" ? activeCategory.startsWith("Lab") : activeCategory===cat;
                      return (
                        <button key={cat} className={`btn btn-sm ${isActive?"btn-primary":"btn-outline"}`}
                          style={{ padding:"5px 10px", fontSize:10 }}
                          onClick={() => setActiveCategory(cat==="Lab" ? (activeCategory.startsWith("Lab") ? "All" : "Lab \u2014 Micro") : cat)}>
                          {cat}
                        </button>
                      );
                    })}
                  </div>
                  {activeCategory.startsWith("Lab") && (
                    <div style={{ display:"flex", flexWrap:"wrap", gap:3, marginBottom:8 }}>
                      {labSubcats.map(sub => (
                        <button key={sub} className={`btn btn-sm ${activeCategory===sub?"btn-primary":"btn-outline"}`}
                          style={{ padding:"3px 7px", fontSize:9 }}
                          onClick={() => setActiveCategory(sub)}>
                          {sub.replace("Lab \u2014 ","")}
                        </button>
                      ))}
                    </div>
                  )}

                  {/* Tests */}
                  <div className="test-list" style={{ maxHeight:380, overflowY:"auto" }}>
                    {visibleTests.map(t => {
                      const isUsed = usedIds.has(t.id);
                      const isProc = processingId === t.id;
                      const isInterviewDoneAlready = t.isInterview && interviewDone;
                      const isDisabled = isUsed || isInterviewDoneAlready || !!processingId || (atTestLimit && !isUsed && !t.isInterview);
                      return (
                        <button key={t.id}
                          className={`test-item ${(isUsed || isInterviewDoneAlready) ? "used" : ""} ${atTestLimit && !isUsed && !t.isInterview ? "qbtn-disabled" : ""}`}
                          disabled={isDisabled}
                          onClick={() => handleTestClick(t)}>
                          {isProc ? <div className="spinner" style={{ flexShrink:0 }} /> : null}
                          <div style={{ flex:1 }}>
                            <div className="test-item-name">
                              {t.isInterview && "💬 "}{t.name}{t.needsSpec ? " *" : ""}
                            </div>
                            <div style={{ fontSize:10, color:"var(--muted)", fontFamily:"var(--mono)", marginTop:1 }}>{t.category}</div>
                          </div>
                          <div className="test-item-cost">${t.cost}</div>
                          {(isUsed || isInterviewDoneAlready) && <span style={{ fontSize:10, color:"var(--accent2)", fontFamily:"var(--mono)" }}>✓</span>}
                        </button>
                      );
                    })}
                  </div>
                  <p style={{ marginTop:8, fontSize:9, color:"var(--muted)", fontFamily:"var(--mono)" }}>* requires specification · 💬 opens interview · unnecessary tests reduce your score</p>
                </div>
                <div className="card-body" style={{ borderTop:"1px solid var(--border)", padding:"11px 14px" }}>
                  <button className="btn btn-primary w-full" onClick={() => setShowDxPanel(true)} disabled={!!processingId || orderedTests.length === 0}>
                    {orderedTests.length === 0 ? "Order a test to begin \u2192" : "Submit Diagnosis \u2192"}
                  </button>
                </div>
              </div>
            </div>
          </div>
        )}

        {/* ── RESULT ────────────────────────────────────────────────────── */}
        {screen === "result" && finalScore && (
          <div style={{ maxWidth:720, margin:"0 auto" }} className="flex-col gap-16">
            <div>
              <p className="display mb-4">Case Complete</p>
              <p className="serif-body">{studentName} · Section {sectionNum} · <span style={{ fontFamily:"var(--mono)", fontSize:11, color:"var(--muted)", textTransform:"uppercase", letterSpacing:1 }}>{assessType}-assessment</span> · {activeCase.title}</p>
            </div>

            {/* Score */}
            <div className="card">
              <div className="card-body" style={{ display:"flex", alignItems:"center", gap:24 }}>
                <div style={{ display:"flex", justifyContent:"center", flexShrink:0 }}><ScoreRing value={finalScore.overall} size={108} stroke={9} /></div>
                <div>
                  <p style={{ fontFamily:"var(--serif)", fontSize:18, marginBottom:4 }}>Assessment Complete</p>
                  <p className="serif-body" style={{ fontSize:14 }}>Your responses have been recorded. Thank you for completing the simulation.</p>
                </div>
              </div>
            </div>

            {/* Dx */}
            <div className="card">
              <div className="card-head"><span className="mono-label">🩺 Your Diagnosis</span></div>
              <div className="card-body">
                <p style={{ fontSize:14 }}>You submitted: <strong>{selectedDx}</strong></p>
              </div>
            </div>

            {/* Tests ordered — names only, no relevance */}
            <div className="card">
              <div className="card-head"><span className="mono-label">📋 Tests Ordered</span></div>
              <div className="card-body" style={{ padding:0 }}>
                <table className="results-table">
                  <thead><tr><th>#</th><th>Test / Interaction</th><th>Category</th></tr></thead>
                  <tbody>
                    {orderedTests.map((t,i) => (
                      <tr key={i}>
                        <td className="mono-label" style={{ width:32 }}>{i+1}</td>
                        <td style={{ fontWeight:500, fontSize:13 }}>{t.name}</td>
                        <td className="text-muted text-sm">{t.category}</td>
                      </tr>
                    ))}
                  </tbody>
                </table>
              </div>
            </div>

            <div className="flex gap-8 justify-end">
              <button className="btn btn-primary" onClick={reset}>Start New Session →</button>
            </div>
          </div>
        )}

        {/* ── RESULTS BOARD ─────────────────────────────────────────────── */}
        {screen === "results_board" && (
          <div>
            <p className="display mb-8">Class Results</p>
            <p className="serif-body mb-16">All student sessions from Google Sheets. Compare pre- and post-assessment performance across the semester.</p>
            {!SHEETS_URL ? (
              <div className="card mb-16" style={{ marginBottom:16 }}>
                <div className="card-head"><span className="mono-label">⚙️ Google Sheets Not Connected</span></div>
                <div className="card-body flex-col gap-12">
                  <div className="alert alert-warn">Paste your Apps Script Web App URL into the <code style={{ fontFamily:"var(--mono)", background:"var(--surface2)", padding:"1px 5px", borderRadius:3 }}>SHEETS_URL</code> constant in the source to enable result saving and loading.</div>
                  <div style={{ fontSize:13, color:"var(--ink2)", lineHeight:1.7 }}>
                    <strong>Setup:</strong> Open <em>MedSim_AppScript.gs</em> → script.google.com → New project → paste → Deploy as Web App (Anyone) → copy URL → paste into SHEETS_URL.
                  </div>
                </div>
              </div>
            ) : (
              <div className="alert alert-success mb-16" style={{ marginBottom:16 }}>✓ Connected to Google Sheets. Results save automatically after each session.</div>
            )}
            <div className="card">
              <div className="card-body" style={{ padding:0 }}>
                {!SHEETS_URL ? (
                  <div style={{ padding:24, textAlign:"center", color:"var(--muted)", fontFamily:"var(--mono)", fontSize:12 }}>Connect Google Sheets to see results here.</div>
                ) : loadingBoard ? (
                  <div className="loading-row" style={{ padding:24, justifyContent:"center" }}><div className="spinner" /> Loading…</div>
                ) : boardData.length === 0 ? (
                  <div style={{ padding:24, textAlign:"center", color:"var(--muted)", fontFamily:"var(--mono)", fontSize:12 }}>No results yet.</div>
                ) : (
                  <table className="results-table">
                    <thead><tr><th>Initials</th><th>Section</th><th>Type</th><th>Case</th><th>Overall</th><th>Tests</th><th>Dx</th><th>Spent</th><th>Date</th></tr></thead>
                    <tbody>
                      {boardData.map((r,i) => (
                        <tr key={i}>
                          <td style={{ fontWeight:500 }}>{r.name}</td>
                          <td className="mono-label">{r.section || "\u2014"}</td>
                          <td><span className="chip chip-neutral">{r.assessType?.toUpperCase()}</span></td>
                          <td className="text-sm text-muted">{r.caseTitle}</td>
                          <td><strong style={{ color:scoreColor(r.score), fontFamily:"var(--mono)" }}>{r.score}</strong></td>
                          <td className="mono-label">{r.testScore}</td>
                          <td>{r.diagnosis === r.correctDx ? <span className="chip chip-optimal">✓</span> : <span className="chip chip-suboptimal">✗</span>}</td>
                          <td className="mono-label">${r.spent}</td>
                          <td className="text-muted text-sm">{r.ts ? new Date(r.ts).toLocaleDateString() : "\u2014"}</td>
                        </tr>
                      ))}
                    </tbody>
                  </table>
                )}
              </div>
            </div>
            <div className="flex gap-8 mt-16"><button className="btn btn-outline" onClick={reset}>← Back</button></div>
          </div>
        )}

        {/* ── MODALS ────────────────────────────────────────────────────── */}
        {showInterview && activeCase && (
          <InterviewModal
            caseData={activeCase}
            onClose={() => setShowInterview(false)}
            onComplete={handleInterviewComplete}
          />
        )}
        {pendingSpec && (
          <SpecModal
            test={pendingSpec}
            caseData={activeCase}
            lymphBiopsied={lymphBiopsied}
            onConfirm={handleSpecConfirm}
            onCancel={() => setPendingSpec(null)}
          />
        )}
        {showRefGuide && <RefGuideModal onClose={() => setShowRefGuide(false)} />}
        {showTutorial && <TutorialModal onClose={() => setShowTutorial(false)} />}
        {showInterviewReview && interviewTranscript.length > 0 && (
          <div className="interview-modal-bg" onClick={() => setShowInterviewReview(false)}>
            <div className="interview-modal" onClick={e => e.stopPropagation()}>
              <div className="interview-header">
                <div className="patient-avatar">🧑‍⚕️</div>
                <div className="interview-header-text">
                  <h3>Interview Transcript — {activeCase.patientName}</h3>
                  <p>Read-only review of your patient interview</p>
                </div>
                <button className="btn btn-outline btn-sm" style={{ marginLeft:"auto" }} onClick={() => setShowInterviewReview(false)}>✕ Close</button>
              </div>
              <div className="chat-window">
                {interviewTranscript.map((msg, i) => (
                  <div key={i} className={`chat-msg ${msg.role === "provider" ? "provider" : "patient"}`}>
                    <div className={`chat-avatar ${msg.role === "patient" ? "pa" : "pr"}`}>
                      {msg.role === "patient" ? "🧑" : "MD"}
                    </div>
                    <div className="chat-bubble" style={{ opacity: msg.distractor ? 0.6 : 1 }}>
                      {msg.distractor && msg.role === "provider" && (
                        <span style={{ fontFamily:"var(--mono)", fontSize:9, color:"var(--accent)", textTransform:"uppercase", letterSpacing:"0.5px", display:"block", marginBottom:3 }}>off-topic</span>
                      )}
                      {msg.text}
                    </div>
                  </div>
                ))}
              </div>
              <div className="interview-footer">
                <span className="asked-count">Review only — interview is complete</span>
                <button className="btn btn-outline btn-sm" onClick={() => setShowInterviewReview(false)}>Close</button>
              </div>
            </div>
          </div>
        )}
      </div>
    </>
  );
}

const { useState } = React;
const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(<App />);
  </script>
</body>
</html>
